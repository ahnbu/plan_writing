project:
  target_audience: "C-Level Executives (CEO, CFO, CSO)"
  tone_and_manner: "Professional, Analytical, Evidence-based, Recursive Logic (MBB Style)"

constraints:
  - "모든 주장은 정량적 근거(Data)나 논리적 추론(Logic)으로 뒷받침되어야 한다."
  - "모호한 형용사('상당한', '많은', '좋은') 사용을 엄격히 금지한다."
  - "결론부터 말하는 두괄식(Answer First) 구조를 유지한다."
  - "[언어 규칙]: 문서의 가독성을 위해 **한국어 작성을 원칙**으로 한다. 단, `SaaS`, `Pivot`, `CAGR` 등 업계 표준 전문용어나 변수명은 원문(영어)을 유지한다."
  - "[장식용 영어 금지]: `Reality Check`, `Unlock Potential` 등 의미 전달보다 '멋'을 부리기 위한 영어 표현을 철저히 배제하고, `현실 진단`, `잠재력 확보` 등 직관적인 한국어로 순화한다."
  - "[심층 분석 규칙 (Deep-Dive)]: 단순 현상 나열을 엄격히 금지함. 모든 챕터는 '현상(Facts) - 원인(Analytic Why) - 시사점(So What)'의 3단 구조를 필히 갖추어야 함. 각 섹션별로 최소 5개 이상의 문장으로 구성된 심층 내러티브를 전개할 것."
  - "[정보 밀도 규칙 (Density)]: 보고서 전체 분량은 공백 제외 4,000자 이상을 지향하며, 각 챕터 및 슬라이드당 최소 3개 이상의 구체적 근거 데이터(정량적 수치 또는 리서치 팩트)를 반드시 포함해야 함."
  - "[도구 사용 규칙]: 문서(Markdown, Text 등) 수정 및 생성 시에는 `Add-Content` 등 쉘 명령어 대신, 시스템 전용 도구(`write_to_file`, `replace_file_content`) 사용을 원칙으로 한다. (불필요한 보안 승인 방지)"

output_rules:
  format: "Markdown"
  language: "Korean (Primary) + English (Technical Terms only)"
